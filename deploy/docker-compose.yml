# A full Aegis node in one command:
#   PUBLIC_HOST=your.domain BOOTSTRAP=seed.aegis.example:5078 docker compose -f deploy/docker-compose.yml up -d
# The very first seed node in a network runs with an empty BOOTSTRAP.
services:
  aegis-node:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "5077:5077" # blind mailbox (clients poll)
      - "5078:5078" # mix (onion traffic + directory)
    volumes:
      - aegis-data:/data
    command:
      - "--advertise-mix"
      - "${PUBLIC_HOST:?set PUBLIC_HOST to your reachable host}:5078"
      - "--advertise-provider"
      - "${PUBLIC_HOST}:5077"
      - "--bootstrap"
      - "${BOOTSTRAP:-127.0.0.1:5078}"

volumes:
  aegis-data:
