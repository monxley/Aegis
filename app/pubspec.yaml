name: aegis
description: "Aegis — anonymous, end-to-end-encrypted, post-quantum messenger."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # The generated bridge needs this at the version codegen pinned (see
  # app/rust/Cargo.toml). Keep the two in lockstep.
  flutter_rust_bridge: 2.0.0
  # Local key/value store for the master seed + relay address.
  shared_preferences: ^2.2.0
  # Local (on-device) notifications for new messages — opt-in in Settings.
  flutter_local_notifications: ^17.2.3
  # Biometric (fingerprint / face) unlock — opt-in over the app password.
  local_auth: ^2.3.0
  # Keystore-backed storage for the biometric-unlock seed (never in plain prefs).
  flutter_secure_storage: ^9.2.2
  # Read the running app version, to compare against the latest GitHub release.
  package_info_plus: ^8.0.0
  # Open the release / APK download URL in the browser for a sideload update.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  # Generates the Android launcher icon (all densities + adaptive) from a source
  # PNG at build time — see deploy/build-apk.sh.
  flutter_launcher_icons: ^0.13.1

# Launcher icon: the Aegis shield.
flutter_launcher_icons:
  android: true
  image_path: "assets/logo/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
